<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolled by Louise</title>
  <meta name="description" content="Dolled by Louise — Lash Artist in Longtown, Cumbria.">
  <meta property="og:title" content="Dolled by Louise — Lash Artist in Longtown, Cumbria">
  <meta property="og:description" content="Expert lash lifts and extensions. Book with Louise today.">
  <meta property="og:image" content="https://placehold.co/1200x630/130a10/c2688e?text=Dolled+by+Louise">
  <meta property="og:url" content="https://dolledbylouise.co.uk/welcome.html">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#130a10">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --plum-deep:   #100610;
      --plum:        #1e0d1a;
      --plum-mid:    #2d1423;
      --rose:        #c2688e;
      --rose-light:  #e8a0c0;
      --gold:        #c9956a;
      --base:        #fdf8f5;
      --spring:      cubic-bezier(0.34, 1.3, 0.64, 1);
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--plum-deep);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── Ambient gradient background ── */
    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 50% 30%, rgba(194,104,142,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(201,149,106,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 15% 80%, rgba(194,104,142,0.06) 0%, transparent 55%);
    }

    /* ── Floating particles ── */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(194,104,142,0.18);
      animation: drift linear infinite;
    }
    .particle:nth-child(1)  { width:3px;  height:3px;  left:12%;  animation-duration:18s; animation-delay:-3s; }
    .particle:nth-child(2)  { width:2px;  height:2px;  left:28%;  animation-duration:22s; animation-delay:-7s; background:rgba(201,149,106,0.25); }
    .particle:nth-child(3)  { width:4px;  height:4px;  left:42%;  animation-duration:15s; animation-delay:-1s; }
    .particle:nth-child(4)  { width:2px;  height:2px;  left:58%;  animation-duration:24s; animation-delay:-11s; background:rgba(201,149,106,0.2); }
    .particle:nth-child(5)  { width:3px;  height:3px;  left:70%;  animation-duration:19s; animation-delay:-5s; }
    .particle:nth-child(6)  { width:2px;  height:2px;  left:84%;  animation-duration:21s; animation-delay:-9s; background:rgba(232,160,192,0.2); }
    .particle:nth-child(7)  { width:3px;  height:3px;  left:22%;  animation-duration:17s; animation-delay:-13s; }
    .particle:nth-child(8)  { width:2px;  height:2px;  left:50%;  animation-duration:25s; animation-delay:-4s; background:rgba(201,149,106,0.15); }
    .particle:nth-child(9)  { width:3px;  height:3px;  left:76%;  animation-duration:20s; animation-delay:-8s; }
    .particle:nth-child(10) { width:2px;  height:2px;  left:90%;  animation-duration:16s; animation-delay:-2s; background:rgba(232,160,192,0.22); }

    @keyframes drift {
      from { transform: translateY(110vh) translateX(0px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      to   { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* ── Horizontal hair lines (decorative) ── */
    .hairline {
      position: fixed; z-index: 0; pointer-events: none;
      background: linear-gradient(to right, transparent, rgba(194,104,142,0.12), transparent);
      height: 1px; width: 100%;
    }
    .hairline-1 { top: 22%; }
    .hairline-2 { top: 76%; }

    /* ── Stage ── */
    #stage {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      padding: 40px 24px;
    }

    /* ── Logo SVG draw animation ── */
    #logo-svg {
      width: min(320px, 78vw);
      height: auto;
      margin-bottom: 32px;
      opacity: 0;
      animation: logoReveal 0.5s var(--ease) 0.3s forwards;
    }
    @keyframes logoReveal { to { opacity: 1; } }

    /* Paths start invisible, draw in sequence */
    .draw {
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawIn 1.8s var(--ease) forwards;
    }
    .draw-arc-top  { animation-delay: 0.5s; stroke-dasharray: 600; stroke-dashoffset: 600; }
    .draw-arc-bot  { animation-delay: 0.9s; stroke-dasharray: 600; stroke-dashoffset: 600; }
    .draw-iris     { animation-delay: 1.2s; stroke-dasharray: 200; stroke-dashoffset: 200; }
    .draw-l1       { animation-delay: 1.5s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l2       { animation-delay: 1.58s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l3       { animation-delay: 1.66s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l4       { animation-delay: 1.74s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l5       { animation-delay: 1.82s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l6       { animation-delay: 1.90s; stroke-dasharray: 50; stroke-dashoffset: 50; }
    .draw-l7       { animation-delay: 1.98s; stroke-dasharray: 50; stroke-dashoffset: 50; }

    .pupil-fill {
      opacity: 0;
      animation: fillIn 0.4s var(--ease) 1.6s forwards;
    }
    @keyframes drawIn  { to { stroke-dashoffset: 0; } }
    @keyframes fillIn  { to { opacity: 1; } }

    /* Wordmark fades up after drawing */
    .wordmark {
      opacity: 0;
      animation: fadeUp 0.9s var(--spring) 2.3s forwards;
    }

    /* ── Wordmark text ── */
    .wm-eyelet {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.7s var(--spring) 2.5s forwards;
    }
    .wm-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(36px, 7vw, 58px);
      letter-spacing: 0.08em;
      color: var(--base);
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.9s var(--spring) 2.6s forwards;
    }
    .wm-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(253,248,245,0.35);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 0.7s var(--spring) 2.8s forwards;
    }

    /* ── Divider rule ── */
    .rule {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, rgba(194,104,142,0.6), transparent);
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeIn 0.6s var(--ease) 3s forwards;
    }

    /* ── Enter button ── */
    .enter-wrap {
      opacity: 0;
      animation: fadeUp 0.8s var(--spring) 3.1s forwards;
    }
    .enter-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 14px;
      padding: 16px 44px;
      background: transparent;
      border: 1px solid rgba(194,104,142,0.45);
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(253,248,245,0.7);
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      overflow: hidden;
    }
    .enter-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(194,104,142,0.15) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .enter-btn:hover { color: #fff; border-color: rgba(194,104,142,0.8); }
    .enter-btn:hover::before { opacity: 1; }
    .enter-btn:active { transform: scale(0.98); }
    .enter-btn:focus-visible { outline: 2px solid var(--rose); outline-offset: 3px; }

    /* Animated shimmer fill on hover */
    .enter-btn::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(194,104,142,0.12), transparent);
      transition: left 0s;
    }
    .enter-btn:hover::after { left: 200%; transition: left 0.6s var(--ease); }

    .enter-arrow {
      display: inline-block;
      transition: transform 0.3s var(--spring);
      color: var(--rose);
      font-size: 14px;
    }
    .enter-btn:hover .enter-arrow { transform: translateX(5px); }

    /* ── Location tag ── */
    .location-tag {
      margin-top: 36px;
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(253,248,245,0.18);
      opacity: 0;
      animation: fadeIn 0.6s var(--ease) 3.4s forwards;
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed; z-index: 5; pointer-events: none;
      width: 40px; height: 40px;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner-tl { top: 28px; left: 28px; }
    .corner-tr { top: 28px; right: 28px; transform: scaleX(-1); }
    .corner-bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
    .corner-br { bottom: 28px; right: 28px; transform: scale(-1); }
    .corner-svg-el {
      stroke: rgba(194,104,142,0.22);
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawIn 0.8s var(--ease) 0.8s forwards;
    }

    /* ── Exit curtain ── */
    #curtain {
      position: fixed; inset: 0; z-index: 999;
      background: var(--base);
      transform: scaleY(0);
      transform-origin: top;
      pointer-events: none;
    }
    #curtain.falling {
      animation: curtainFall 0.9s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }
    @keyframes curtainFall {
      from { transform: scaleY(0); transform-origin: top; }
      to   { transform: scaleY(1); transform-origin: top; }
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:0.01ms !important; }
    }
  </style>
</head>
<body>

  <div class="ambient" aria-hidden="true"></div>
  <div class="particles" aria-hidden="true">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="hairline hairline-1" aria-hidden="true"></div>
  <div class="hairline hairline-2" aria-hidden="true"></div>

  <!-- Corner brackets -->
  <div class="corner corner-tl" aria-hidden="true">
    <svg viewBox="0 0 40 40" fill="none"><path class="corner-svg-el" d="M 38 2 L 2 2 L 2 38" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="corner corner-tr" aria-hidden="true">
    <svg viewBox="0 0 40 40" fill="none"><path class="corner-svg-el" d="M 38 2 L 2 2 L 2 38" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" style="animation-delay:0.9s"/></svg>
  </div>
  <div class="corner corner-bl" aria-hidden="true">
    <svg viewBox="0 0 40 40" fill="none"><path class="corner-svg-el" d="M 38 2 L 2 2 L 2 38" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" style="animation-delay:1s"/></svg>
  </div>
  <div class="corner corner-br" aria-hidden="true">
    <svg viewBox="0 0 40 40" fill="none"><path class="corner-svg-el" d="M 38 2 L 2 2 L 2 38" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round" style="animation-delay:1.1s"/></svg>
  </div>

  <!-- Exit curtain -->
  <div id="curtain" aria-hidden="true"></div>

  <!-- ── Main stage ── -->
  <main id="stage" role="main">

    <!-- Logo SVG — draws itself in -->
    <svg id="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" aria-label="Dolled by Louise logo — eye with lashes">
      <!-- Top arc of eye -->
      <path class="draw draw-arc-top"
        d="M10 58 Q70 14 140 58 Q210 102 270 58"
        stroke="#c97fa0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Bottom arc (dimmer) -->
      <path class="draw draw-arc-bot"
        d="M10 58 Q70 102 140 58 Q210 14 270 58"
        stroke="#c97fa0" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.3"/>
      <!-- Iris -->
      <circle class="draw draw-iris"
        cx="140" cy="58" r="15"
        stroke="#c97fa0" stroke-width="1.6" fill="none"/>
      <!-- Pupil -->
      <circle class="pupil-fill"
        cx="140" cy="58" r="6" fill="#c97fa0"/>
      <!-- Lash lines — each draws in -->
      <line class="draw draw-l1" x1="60"  y1="34" x2="55"  y2="18" stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l2" x1="88"  y1="22" x2="86"  y2="8"  stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l3" x1="114" y1="16" x2="114" y2="4"  stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l4" x1="140" y1="14" x2="140" y2="2"  stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l5" x1="166" y1="16" x2="167" y2="4"  stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l6" x1="192" y1="22" x2="194" y2="8"  stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
      <line class="draw draw-l7" x1="220" y1="34" x2="226" y2="18" stroke="rgba(253,248,245,0.7)" stroke-width="1.6" stroke-linecap="round"/>
    </svg>

    <!-- Wordmark & subtext -->
    <p class="wm-eyelet">Est. Longtown, Cumbria</p>
    <h1 class="wm-name">Dolled by Louise</h1>
    <p class="wm-sub">Lash Artist &amp; Beauty Studio</p>

    <!-- Vertical rule -->
    <div class="rule" aria-hidden="true"></div>

    <!-- Enter button -->
    <div class="enter-wrap">
      <a href="index.html" class="enter-btn" id="enterBtn" aria-label="Enter the Dolled by Louise website">
        Enter
        <span class="enter-arrow" aria-hidden="true">→</span>
      </a>
    </div>

    <!-- Location -->
    <p class="location-tag" aria-label="Location: Longtown, Cumbria">✦ &nbsp; Longtown, Cumbria &nbsp; ✦</p>

  </main>

  <script>
    // ── Curtain transition on enter ──
    const btn = document.getElementById('enterBtn');
    const curtain = document.getElementById('curtain');

    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const dest = this.getAttribute('href');

      // Mark as entered so index.html won't redirect back
      sessionStorage.setItem('dbl_entered', '1');

      curtain.classList.add('falling');

      // Navigate after curtain covers screen
      curtain.addEventListener('animationend', () => {
        window.location.href = dest;
      }, { once: true });
    });

    // ── Skip if already visited this session ──
    if (sessionStorage.getItem('dbl_entered')) {
      window.location.replace('index.html');
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
</body>
</html>
